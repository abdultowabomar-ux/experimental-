const finalizeLogin = async () => {
    
    // ⭐ تشغيل شاشة التحميل
    setIsChecking(true);
    
    try {
        
        // 1. استخراج وتنظيف البيانات الأساسية
        const name = student.name?.trim();
        const level = student.level;
        const phone = student.phone?.trim();
        const code = student.code?.trim().toLowerCase();
        const university = student.university;
        
        // التحقق من الحقول الإلزامية
        if (!name || !level || !phone || !university) {
            alert("⚠️ فضلاً يا بطل.. أكمل جميع البيانات للمتابعة!");
            return;
        }
        
        // 2. منطق التحقق (كود التفعيل vs الدخول المجاني)
        if (!isFreeMode) {
            
            // التحقق من وجود الكود وصحته
            if (!code || !VALID_CODES.includes(code)) {
                alert("❌ كود التفعيل غير صحيح أو مطلوب للوصول لهذا القسم!");
                return;
            }
            
            // إنشاء معرف الجهاز
            let deviceIdentifier = localStorage.getItem('academy_device_id');
            
            if (!deviceIdentifier) {
                deviceIdentifier =
                    'dev_' +
                    Math.random().toString(36).substr(2, 9) +
                    Date.now().toString(36);
                
                localStorage.setItem(
                    'academy_device_id',
                    deviceIdentifier
                );
            }
            
            try {
                
                const codeRef =
                    db.ref('academy_codes/' + code);
                
                const snapshot =
                    await codeRef.once('value');
                
                const data = snapshot.val();
                
                if (data) {
                    
                    // أ- حالة الطرد
                    if (data.status === 'kicked') {
                        
                        alert(
                            `🚫 تم حظر دخولك!\nالسبب: ${data.kickReason || "مخالفة شروط الأكاديمية"}\n\nيرجى التواصل مع الدعم الفني.`
                        );
                        
                        return;
                    }
                    
                    // ب- جهاز آخر
                    if (
                        data.deviceId &&
                        data.deviceId !== deviceIdentifier
                    ) {
                        
                        alert("⚠️ هذا الكود مفعل بالفعل على جهاز آخر!");
                        
                        return;
                    }
                    
                } else {
                    
                    // ج- تفعيل لأول مرة
                    await codeRef.set({
                        
                        isUsed: true,
                        deviceId: deviceIdentifier,
                        studentName: name,
                        studentPhone: phone,
                        level: level,
                        university: university,
                        useDate: new Date().toLocaleString('ar-EG'),
                        status: 'active'
                        
                    });
                    
                }
                
            } catch (error) {
                
                console.error("Firebase Error:", error);
                
                alert(
                    "⚠️ عذراً، حدث خطأ في الاتصال بالسيرفر. تأكد من الإنترنت وحاول مجدداً."
                );
                
                return;
            }
        }
        
        // 3. حفظ الجلسة
        
        const sessionData = {
            
            ...student,
            loginDate: new Date().getTime()
            
        };
        
        localStorage.setItem(
            'academy_student_data',
            JSON.stringify(sessionData)
        );
        
        setStudent(sessionData);
        
        // 4. إرسال تقرير تليجرام (في الخلفية)
        
        const accessType =
            isFreeMode ?
            "🆓 دخول مجاني" :
            "🔑 دخول بكود تفعيل";
        
        const logMessage = `
🔔 **تنبيه دخول جديد**
━━━━━━━━━━━━
🎯 **النوع:** ${accessType}
👤 **الطالب:** ${name}
📱 **الهاتف:** ${phone}
🏛️ **الجامعة:** ${university}
🎓 **الفرقة:** ${level}
🔑 **الكود:** ${isFreeMode ? "بدون كود" : code}
📍 **القسم:** ${targetDept}
📱 **الجهاز:** \`${localStorage.getItem('academy_device_id')}\`
━━━━━━━━━━━━`;
        
        // ⭐ تشغيله في الخلفية بدون تعطيل
        setTimeout(() => {
            sendTelegram(logMessage);
        }, 0);
        
        // 5. رسالة نجاح
        
        alert(
            isFreeMode ?
            "✅ استمتع بالاختبار يا بطل!" :
            "✅ تم تفعيل الكود بنجاح.. نورت الأكاديمية"
        );
        
        // 6. الانتقال
        
        setShowLogin(false);
        
        if (targetDept === 'شرح') {
            setView('lessons');
        } else {
            setView('exams');
        }
        
    } finally {
        
        // ⭐ أهم سطر — يمنع التعليق نهائي

    }

{/* إظهار خانة الكود فقط إذا لم يكن الدخول مجانياً */}
{!isFreeMode && (

                                <select onChange={(e) => setStudent({...student, level: e.target.value})} className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 text-gray-400 outline-none">

</select>

   function Card({ title, icon, color, onClick, isFree }) {
    return (
        <div onClick={onClick} className="glass p-10 rounded-[40px] text-center cursor-pointer relative overflow-hidden group hover:-translate-y-4 transition-all duration-500">

            <h3 className="text-xl font-bold mb-4">{title}</h3>
            
            <div className="text-xs text-gray-400 group-hover:text-orange-500 transition">

        </div>
    );
}
